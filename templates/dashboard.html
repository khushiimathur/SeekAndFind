
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <style>
        /* Basic styles for the cards */
        .card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 16px;
            margin: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 300px;
            display: inline-block;
            vertical-align: top;
        }
        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .card h3 {
            margin: 10px 0;
        }
        .card p {
            margin: 5px 0;
        }
        #lost-items-container, #found-items-container {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: space-around;
        }
        button {
            background-color: #123c69;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1e62ab;
        }
        .input-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            max-width: 500px; /* Restrict the width */
            margin: 0 auto; /* Center the container */
            padding: 16px;
        }
        .input-container input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            flex: 1;
        }
        .input-container button {
            padding: 8px 16px;
            border-radius: 4px;
            margin-top: -1em;
        }
        #dashboard{
            margin-left:1.5em;
            margin-bottom:0.5em;
            color:#123c69;
        }
        .items{
          margin-left:2em;
            margin-bottom:1em;
            color:#123c69;
        }
        #delete{
            background-color: #edc7b7;
        }
        #delete:hover{
            background-color:#eaa88c ;
        }
        html, body {
    height: 100%; /* Ensures the body takes up the full height of the viewport */
    margin: 0;
    display: flex;
    flex-direction: column;
}

#footer {
    background-color: #ac3b61; /* Set your desired background color */
    padding: 10px 0;
    width: 100%;
    margin-top: auto; /* Pushes the footer to the bottom when the content is short */
}

.footer-content {
    max-width: 1200px;
    margin: 0 auto;
    text-align: left; /* Align text to the left */
}

.developer {
    margin: 5px 0;
}

        /* For tablets and smaller screens (up to 768px) */
@media only screen and (max-width: 768px) {
    .input-container {
        flex-direction: column;
        width: 100%;
    }
    .card {
        width: 90%;
        margin: 10px auto;
    }
    
}

/* For phone screens (up to 480px) */
@media only screen and (max-width: 480px) {
    .input-container {
        flex-direction: column;
        width: 100%;
    }
    input, button {
        width: 100%;
        margin-bottom: 10px;
        font-size: 0.9em;
    }
    .card {
        width: 95%;
        margin: 10px auto;
    }
}

    </style>
    <base target="_top">
    <script>
async function initPage() {
    const email = document.getElementById("email").value;
    
    if (!email.endsWith("@igdtuw.ac.in")) {
        alert("Only IGDTUW email allowed");
        return;
    }
    

    try {
        const res = await fetch(`/dashboard-data?email=${encodeURIComponent(email)}`);
        const data = await res.json();

        displayData(data.lost, 'lost-items-container');
        displayData(data.found, 'found-items-container');

    } catch (err) {
        console.error(err);
        alert("Error fetching data");
    }
}


function displayData(items, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    if (items.length === 0) {
        container.innerHTML = "<p>No entries found.</p>";
        return;
    }

    items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <h3>${item.item_name}</h3>
            <p><strong>Full Name:</strong> ${item.name}</p>
            <p><strong>Description:</strong> ${item.description}</p>
            <p><strong>Contact:</strong> ${item.contact}</p>
            <p><strong>Email:</strong> ${item.email}</p>

            ${item.image ? `<img src="${item.image}" />` : '<p>No image</p>'}

            <button onclick="deleteItem('${item._id}')">Delete</button>
        `;

        container.appendChild(card);
    });
}


async function deleteItem(id) {
    if (!confirm("Are you sure?")) return;

    try {
        const res = await fetch('/delete-item', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });

        const data = await res.json();
        alert(data.message);

        initPage(); // refresh

    } catch (err) {
        console.error(err);
        alert("Delete failed");
    }
}
</script>
</head>
